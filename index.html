  <!--

  <script>

    function gtag(){dataLayer.push(arguments);}
    // Read prior consent from localStorage so returning visitors who already
    // accepted don't see a downgrade flash. Defaults to denied for first-timers.

      var defaults = { ad_storage: 'denied', ad_user_data: 'denied', ad_personalization: 'denied', analytics_storage: 'denied', functionality_storage: 'granted', security_storage: 'granted', wait_for_update: 500 };

        if (raw) {
          var p = raw === 'all' ? { analytics: true, marketing: true }
                : raw === 'essential' ? { analytics: false, marketing: false }
                : JSON.parse(raw);
          if (p && p.analytics) defaults.analytics_storage = 'granted';
          if (p && p.marketing) { defaults.ad_storage = 'granted'; defaults.ad_user_data = 'granted'; defaults.ad_personalization = 'granted'; }
        }
      } catch (e) {}
      gtag('consent', 'default', defaults);
    })();
    gtag('js', new Date());
