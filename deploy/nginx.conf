# =========================================================================
#  Nginx config за demetriosbride-bg.com (Hetzner VPS)
#  Място: /etc/nginx/sites-available/demetriosbride-bg.com
#  След промени:  sudo nginx -t  &&  sudo systemctl reload nginx
# =========================================================================

# --- HTTPS upstream (Node.js API сървър) ----------------------------------
upstream areti_api {
    server 127.0.0.1:4000;
    keepalive 16;
}

# --- HTTP → HTTPS пренасочване --------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name demetriosbride-bg.com www.demetriosbride-bg.com;

    # ACME challenge (за Let's Encrypt / certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://demetriosbride-bg.com$request_uri;
    }
}

# --- www → non-www канонична версия ---------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.demetriosbride-bg.com;

    ssl_certificate     /etc/letsencrypt/live/demetriosbride-bg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demetriosbride-bg.com/privkey.pem;

    return 301 https://demetriosbride-bg.com$request_uri;
}

# --- Основен HTTPS сървър -------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demetriosbride-bg.com;

    # SSL (certbot управлява обновяванията автоматично)
    ssl_certificate     /etc/letsencrypt/live/demetriosbride-bg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demetriosbride-bg.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers (helmet вече ги слага на API, тук добавяме за статиката)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Gzip / Brotli
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

    # Статични файлове на SPA
    root /var/www/demetriosbride-bg.com/dist;
    index index.html;

    # === 301 пренасочвания от стари WordPress URL-и =======================
    location = /za-nas              { return 301 /about; }
    location = /za-nas/             { return 301 /about; }
    location = /kontakti            { return 301 /contact; }
    location = /kontakti/           { return 301 /contact; }
    location = /zapishi-chas        { return 301 /booking; }
    location = /zapishi-chas/       { return 301 /booking; }
    location = /za-demetrios        { return 301 /demetrios; }
    location = /za-demetrios/       { return 301 /demetrios; }
    location = /demetrios-platinum  { return 301 /collection/platinum; }
    location = /demetrios-platinum/ { return 301 /collection/platinum; }
    location = /cosmobella          { return 301 /collection/cosmobella; }
    location = /cosmobella/         { return 301 /collection/cosmobella; }
    location = /destination-romance { return 301 /collection/destination; }
    location = /destination-romance/{ return 301 /collection/destination; }
    location = /otzivi              { return 301 /about; }
    location = /otzivi/             { return 301 /about; }
    location = /fqa                 { return 301 /contact; }
    location = /fqa/                { return 301 /contact; }
    location = /nashite-bulki       { return 301 /about; }
    location = /nashite-bulki/      { return 301 /about; }
    location = /author/areti1       { return 301 /; }
    location = /author/areti1/      { return 301 /; }
    location = /bulchinski-rokli    { return 301 /collection/demetrios; }
    location = /bulchinski-rokli/   { return 301 /collection/demetrios; }
    location = /bulchinski-rokli-2  { return 301 /collection; }
    location = /bulchinski-rokli-2/ { return 301 /collection; }
    location = /bulchenski-rokli-sofia  { return 301 /collection; }
    location = /bulchenski-rokli-sofia/ { return 301 /collection; }
    location = /vecherni-rokli      { return 301 /collection/evening; }
    location = /vecherni-rokli/     { return 301 /collection/evening; }

    # Кирилица — старите WP slug-ове
    location ~* ^/булчински-рокли-и-сватбени-рокли-в-соф/?$ { return 301 /collection; }
    location ~* ^/бална-рокля-според-фигурата-как-да-изб/?$ { return 301 /blog; }
    location ~* ^/кой-е-demetrios/?$                        { return 301 /demetrios; }
    location ~* ^/сватбен-магазин-в-софия-сватбени-ро/?$    { return 301 /collection; }

    # Pattern-based 301-и
    location ~* ^/bulchinski-rokli/page/[0-9]+/?$ { return 301 /collection/demetrios; }
    location ~* ^/vecherni-rokli/page/[0-9]+/?$   { return 301 /collection/evening; }
    location ~* ^/blog/page/[0-9]+/?$             { return 301 /blog; }
    location ~* ^/product-category/.*$            { return 301 /collection; }

    # === API сървър (Node.js на порт 4000) ================================
    # sitemap.xml и robots.txt — генерират се динамично от Express
    location = /sitemap.xml {
        proxy_pass http://areti_api/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /robots.txt {
        proxy_pass http://areti_api/api/robots.txt;
        proxy_set_header Host $host;
    }
    location /api/ {
        proxy_pass http://areti_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # === Кеш за статичните assets =========================================
    location ~* \.(?:css|js|woff2?|jpg|jpeg|png|webp|svg|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # === SPA fallback =====================================================
    # Всеки неизвестен път връща index.html, за да може React router-а
    # да поеме. index.html НЕ се кешира за да виждат потребителите всеки нов deploy.
    location / {
        try_files $uri $uri/ /index.html;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # 404 връща index.html (SPA има свой 404 handler)
    error_page 404 = /index.html;
}
